<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Gudi Padwa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #f5f3ea, #e6efe6);
    overflow-x: hidden;
}

/* OPEN SCREEN */
#openScreen {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8efe6;
}

.open-box {
    text-align: center;
    animation: float 3s infinite ease-in-out;
}

.open-text {
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    color: #2f4f3f;
}

.open-btn {
    padding: 14px 40px;
    border-radius: 40px;
    border: 2px solid #2f4f3f;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    transition: 0.4s;
}

.open-btn:hover {
    background: #2f4f3f;
    color: white;
}

/* CARD */
#card {
    display: none;
    padding: 30px 15px;
}

.card-container {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    border: 2px solid #d8d8c8;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeUp 1.5s ease forwards;
}

/* Decorative Border */
.card-container::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid #c7d3c0;
    border-radius: 15px;
}

/* IMAGE */
.top-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
    animation: zoomIn 1.5s ease;
}

/* TEXT */
h1 {
    font-size: 30px;
    margin-bottom: 15px;
    color: #2f4f3f;
}

.message {
    font-family: 'Poppins', sans-serif;
    font-size: 17px;
    line-height: 1.9;
    color: #3a5a40;
    white-space: pre-line;
}

/* PETALS */
.petal {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    background: #c7d3c0;
    border-radius: 50%;
    opacity: 0.6;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* ANIMATIONS */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes zoomIn {
    from {transform: scale(0.9); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
    100% {transform: translateY(0);}
}

</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="openScreen">
    <div class="open-box">
        <div class="open-text">A Small Surprise For You</div>
        <button class="open-btn" onclick="openCard()">Open Me</button>
    </div>
</div>

<!-- MAIN CARD -->
<div id="card">
    <div class="card-container">

        <img src="image.jpg" class="top-img">

        <h1>Happy Gudi Padwa 💚</h1>

        <p class="message" id="typeText"></p>

    </div>
</div>

<!-- AUDIO -->
<audio id="song">
    <source src="Navasachi Gauri Mazi (From Gharat Ganpati).mp3" type="audio/mp3">
</audio>

<script>

// TYPEWRITER TEXT
const message = `As it's called the Marathi New Year..as much as ik this day is really good for new promises too , so on this auspicious day  
I promise you to be yours forever and love you endlessly.  
Let's promise each other to stay together no matter what.  

Happy Gudi Padwa, my ukdicha modak.  

And I promise... maybe after 10 years,  
we will celebrate our first Gudi Padwa together.`;

let i = 0;
function typeEffect() {
    if (i < message.length) {
        document.getElementById("typeText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 30);
    }
}

// OPEN FUNCTION
function openCard() {
    document.getElementById("openScreen").style.display = "none";
    document.getElementById("card").style.display = "block";

    let song = document.getElementById("song");
    song.currentTime = 66;
    song.volume = 0;
    song.play();

    // fade in sound
    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            song.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);

    typeEffect();
}

// PETALS GENERATOR
for (let i = 0; i < 20; i++) {
    let petal = document.createElement("div");
    petal.className = "petal";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(petal);
}

</script>

</body>
</html>
